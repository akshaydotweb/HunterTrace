<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1500" viewBox="0 0 760 1500" role="img" aria-labelledby="title desc">
  <title id="title">HunterTrace Single Email Container</title>
  <desc id="desc">Single email intelligence pipeline container exported as SVG with transparent background.</desc>

  <style>
    .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
    .sans { font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; }

    .lane-title { font-size: 11px; letter-spacing: 2.2px; text-transform: uppercase; fill: #0f62fe; }

    .lane-box { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1; }

    .zone { fill: #ffffff; stroke: #e0e0e0; stroke-width: 1; rx: 0; }
    .zone-text { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

    .node { stroke-width: 1; }
    .node-label { font-size: 8.5px; letter-spacing: 1.3px; text-transform: uppercase; fill: #525252; }
    .node-title { font-size: 13px; font-weight: 600; fill: #161616; }
    .node-sub { font-size: 10.5px; fill: #525252; }

    .flow-mandatory { stroke: #8d8d8d; stroke-width: 1.5; fill: none; }
    .flow-primary { stroke: #24a148; stroke-width: 1.5; fill: none; }
    .flow-optional { stroke: #a8a8a8; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; }
  </style>

  <!-- Transparent canvas: no full-background rect on purpose -->

  <text x="22" y="22" class="mono lane-title">Single email</text>

  <rect x="20" y="34" width="720" height="1446" class="lane-box"/>

  <!-- Zone strip -->
  <g transform="translate(40, 52)">
    <rect x="0" y="0" width="100" height="22" class="zone" stroke="#525252"/>
    <text x="8" y="14" class="mono zone-text" fill="#525252">① Inputs</text>

    <rect x="108" y="0" width="130" height="22" class="zone" stroke="#0f62fe"/>
    <text x="116" y="14" class="mono zone-text" fill="#0f62fe">② Core Pipeline</text>

    <rect x="246" y="0" width="190" height="22" class="zone" stroke="#f1c21b"/>
    <text x="254" y="14" class="mono zone-text" fill="#8e6a00">③ Decision / Confidence</text>

    <rect x="444" y="0" width="90" height="22" class="zone" stroke="#24a148"/>
    <text x="452" y="14" class="mono zone-text" fill="#24a148">④ Outputs</text>

    <rect x="542" y="0" width="80" height="22" class="zone" stroke="#8a3ffc"/>
    <text x="550" y="14" class="mono zone-text" fill="#8a3ffc">⑤ Action</text>
  </g>

  <line x1="40" y1="84" x2="720" y2="84" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Shared node geometry -->
  <!-- x=120, w=520, h=110 -->

  <!-- 1. Ingestion -->
  <g transform="translate(120, 104)">
    <rect width="520" height="110" fill="#f4f4f4" stroke="#e0e0e0" class="node"/>
    <rect width="3" height="110" fill="#525252"/>
    <text x="14" y="20" class="mono node-label">ingestion</text>
    <text x="14" y="49" class="sans node-title">Raw Email</text>
    <text x="14" y="70" class="sans node-sub">.eml file input</text>
  </g>

  <!-- connector -->
  <g transform="translate(380, 232)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-mandatory"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-mandatory"/>
  </g>

  <!-- 2. Signal extraction -->
  <g transform="translate(120, 258)">
    <rect width="520" height="110" fill="#edf5ff" stroke="#c6daff" class="node"/>
    <rect width="3" height="110" fill="#0f62fe"/>
    <text x="14" y="20" class="mono node-label">signal extraction</text>
    <text x="14" y="49" class="sans node-title">Headers &amp; Routing</text>
    <text x="14" y="70" class="sans node-sub">Auth, DKIM, relay chain</text>
  </g>

  <g transform="translate(380, 386)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-mandatory"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-mandatory"/>
  </g>

  <!-- 3. Obfuscation analysis -->
  <g transform="translate(120, 412)">
    <rect width="520" height="110" fill="#fcf4d6" stroke="#f3d989" class="node"/>
    <rect width="3" height="110" fill="#b28600"/>
    <text x="14" y="20" class="mono node-label">obfuscation analysis</text>
    <text x="14" y="49" class="sans node-title">VPN / Proxy Detection</text>
    <text x="14" y="70" class="sans node-sub">Relay, spoofing, backtrack</text>
  </g>

  <g transform="translate(380, 540)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-mandatory"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-mandatory"/>
  </g>

  <!-- 4. Enrichment -->
  <g transform="translate(120, 566)">
    <rect width="520" height="110" fill="#d9fbfb" stroke="#8de1df" class="node"/>
    <rect width="3" height="110" fill="#009d9a"/>
    <text x="14" y="20" class="mono node-label">enrichment</text>
    <text x="14" y="49" class="sans node-title">Geo / ASN / WHOIS</text>
    <text x="14" y="70" class="sans node-sub">Threat intel overlay</text>
  </g>

  <g transform="translate(380, 694)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-mandatory"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-mandatory"/>
  </g>

  <!-- 5. Signal fusion -->
  <g transform="translate(120, 720)">
    <rect width="520" height="110" fill="#edf5ff" stroke="#c6daff" class="node"/>
    <rect width="3" height="110" fill="#0f62fe"/>
    <text x="14" y="20" class="mono node-label">signal fusion</text>
    <text x="14" y="49" class="sans node-title">Probabilistic Attribution</text>
    <text x="14" y="70" class="sans node-sub">Ranked candidates</text>
  </g>

  <g transform="translate(380, 848)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-mandatory"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-mandatory"/>
  </g>

  <!-- 6. Confidence gate -->
  <g transform="translate(120, 874)">
    <rect width="520" height="126" fill="#fcf4d6" stroke="#f3d989" class="node"/>
    <rect width="3" height="126" fill="#b28600"/>
    <text x="14" y="20" class="mono node-label">confidence gate</text>
    <text x="14" y="49" class="sans node-title">Calibration &amp; Verdict</text>
    <text x="14" y="70" class="sans node-sub">False-flag check</text>

    <rect x="14" y="84" width="492" height="4" fill="#c6c6c6"/>
    <rect x="14" y="84" width="364" height="4" fill="#b28600"/>
    <text x="14" y="102" class="mono" font-size="8" fill="#6f6f6f">low</text>
    <text x="238" y="102" class="mono" font-size="8" fill="#6f6f6f">posterior</text>
    <text x="484" y="102" class="mono" font-size="8" fill="#6f6f6f">high</text>
  </g>

  <g transform="translate(380, 1018)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-primary"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-primary"/>
  </g>

  <!-- 7. Intelligence products -->
  <g transform="translate(120, 1044)">
    <rect width="520" height="110" fill="#defbe6" stroke="#a7f0ba" class="node"/>
    <rect width="3" height="110" fill="#24a148"/>
    <text x="14" y="20" class="mono node-label">intelligence products</text>
    <text x="14" y="49" class="sans node-title">Analyst Report</text>
    <text x="14" y="70" class="sans node-sub">Attribution verdict, MITRE</text>
  </g>

  <g transform="translate(380, 1172)">
    <line x1="0" y1="0" x2="0" y2="26" class="flow-optional"/>
    <path d="M-4 20 L0 26 L4 20" class="flow-optional"/>
  </g>

  <!-- 8. Action layer -->
  <g transform="translate(120, 1198)">
    <rect width="520" height="110" fill="#f6f2ff" stroke="#d4bbff" class="node"/>
    <rect width="3" height="110" fill="#8a3ffc"/>
    <text x="14" y="20" class="mono node-label">action layer</text>
    <text x="14" y="49" class="sans node-title">Triage &amp; Escalation</text>
    <text x="14" y="70" class="sans node-sub">Investigation priorities</text>
  </g>
</svg>

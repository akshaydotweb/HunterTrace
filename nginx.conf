events {
    worker_connections 1024;
}

http {
    upstream huntertrace_api {
        server huntertrace-api:8000 max_fails=3 fail_timeout=30s;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=batch:10m rate=2r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;

        # Max request body size
        client_max_body_size 10m;

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        # Version endpoint (no rate limit)
        location /version {
            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # Config endpoint (no rate limit)
        location /config {
            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # Batch endpoint (stricter rate limit)
        location /batch {
            limit_req zone=batch burst=5 nodelay;

            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Analyze endpoint
        location /analyze {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Swagger/ReDoc UI (rate limited but less strict)
        location ~ ^/(docs|redoc|openapi.json)$ {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
        }

        # Default to API
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://huntertrace_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Error pages
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            default_type application/json;
            return 503 '{"error_code":"service_unavailable","message":"Service temporarily unavailable"}';
        }
    }

    # HTTPS configuration (uncomment after getting SSL certs)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Include same location blocks as above
    # }
    #
    # # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
}

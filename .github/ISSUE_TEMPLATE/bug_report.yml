name: Bug Report
description: Report a bug in HunterTrace
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Run `huntertrace analyze ...`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HunterTrace Version
      description: "Output of: `huntertrace --version`"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      description: "Output of: `python3 --version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
    validations:
      required: true
